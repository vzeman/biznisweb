name: Build and Push ECR

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - requirements.txt
      - export_orders.py
      - generate_invoices.py
      - invoice_runner.py
      - html_report_generator.py
      - daily_report_runner.py
      - dashboard_modern.py
      - project_config.py
      - weather_client.py
      - http_client.py
      - facebook_ads.py
      - google_ads.py
      - reporting_core/**
      - projects/**
      - templates/**
      - scripts/reporting_qa_smoke.py
      - .github/workflows/build-and-push-ecr.yml

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: vevo-reporting
  IMAGE_TAG: latest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install reporting dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Reporting regression smoke gate
        run: |
          python scripts/reporting_qa_smoke.py

      - name: Invoice automation regression test
        run: |
          python -m unittest tests.test_invoice_generation

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Building $IMAGE_URI"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Verify image in ECR
        run: |
          aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
            --query 'imageDetails[].imageTags'
