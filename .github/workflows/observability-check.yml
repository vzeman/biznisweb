name: Observability Baseline

on:
  pull_request:
  push:
    branches:
      - main
      - opan-claw
      - codex/week-of-month-pattern

jobs:
  observability-baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate observability snapshot
        run: |
          mkdir -p .runtime
          python scripts/observability_snapshot.py --ci --pretty --output .runtime/observability-reporting.json

      - name: Upload observability artifact
        uses: actions/upload-artifact@v4
        with:
          name: observability-reporting
          path: .runtime/observability-reporting.json
