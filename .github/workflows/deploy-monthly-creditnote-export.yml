name: Deploy Monthly Accounting Export

on:
  workflow_dispatch:
    inputs:
      execute_now:
        description: Run the host smoke and send only when send_email_now is enabled
        required: false
        default: false
        type: boolean
      send_email_now:
        description: Send the email during execute_now instead of SES dry-run
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - creditnote_export.py
      - money_s3_invoice_export.py
      - monthly_creditnote_export_runner.py
      - projects/roy/settings.json
      - projects/vevo/settings.json
      - reporting_core/**
      - http_client.py
      - Dockerfile
      - requirements.txt
      - .github/workflows/deploy-monthly-creditnote-export.yml

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: vevo-reporting
  ECR_CURRENT_TAG: monthly-creditnote-export-current
  ECR_CANDIDATE_TAG: monthly-creditnote-export-candidate
  ALERT_TOPIC_NAME: vevo-reporting-alerts-mil-final
  DLQ_NAME: monthly-creditnote-export-dlq
  OWNER_PROJECT: roy
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy scheduler and run host smoke
        shell: bash
        env:
          EXECUTE_NOW: ${{ inputs.execute_now || 'false' }}
          SEND_EMAIL_NOW: ${{ inputs.send_email_now || 'false' }}
          ROY_BIZNISWEB_USERNAME: ${{ secrets.ROY_BIZNISWEB_USERNAME }}
          ROY_BIZNISWEB_PASSWORD: ${{ secrets.ROY_BIZNISWEB_PASSWORD }}
          VEVO_BIZNISWEB_USERNAME: ${{ secrets.VEVO_BIZNISWEB_USERNAME }}
          VEVO_BIZNISWEB_PASSWORD: ${{ secrets.VEVO_BIZNISWEB_PASSWORD }}
        run: |
          set -euo pipefail

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          DEPLOY_IMAGE_TAG="monthly-creditnote-export-${GITHUB_SHA}"
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${DEPLOY_IMAGE_TAG}"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          IMAGE_DIGEST="$(aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${DEPLOY_IMAGE_TAG}" \
            --region "${AWS_REGION}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          IMAGE_IDENTIFIER="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}@${IMAGE_DIGEST}"

          protect_ecr_image_tag() {
            local image_identifier="$1"
            local protection_tag="$2"
            if [[ "${image_identifier}" != *@sha256:* ]]; then
              echo "Skipping ${protection_tag}; image is not digest-pinned: ${image_identifier}"
              return 0
            fi
            local image_digest="${image_identifier##*@}"
            local existing_digest
            existing_digest="$(aws ecr describe-images \
              --repository-name "${ECR_REPOSITORY}" \
              --image-ids imageTag="${protection_tag}" \
              --region "${AWS_REGION}" \
              --query 'imageDetails[0].imageDigest' \
              --output text 2>/dev/null || true)"
            if [[ "${existing_digest}" == "${image_digest}" ]]; then
              echo "ECR_IMAGE_PROTECTED:${protection_tag}:${image_digest}:already"
              return 0
            fi
            local manifest_file
            local manifest_response_file
            manifest_file="$(mktemp)"
            manifest_response_file="$(mktemp)"
            aws ecr batch-get-image \
              --repository-name "${ECR_REPOSITORY}" \
              --image-ids imageDigest="${image_digest}" \
              --region "${AWS_REGION}" \
              --output json > "${manifest_response_file}"
            python - "${manifest_response_file}" "${manifest_file}" <<'PY'
          import json
          import pathlib
          import sys

          response = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          images = response.get("images") or []
          if not images or not images[0].get("imageManifest"):
              raise SystemExit("ECR batch-get-image did not return an image manifest")
          pathlib.Path(sys.argv[2]).write_text(images[0]["imageManifest"], encoding="utf-8")
          PY
            python -m json.tool "${manifest_file}" >/dev/null
            local put_output
            if ! put_output="$(aws ecr put-image \
              --repository-name "${ECR_REPOSITORY}" \
              --image-tag "${protection_tag}" \
              --image-manifest "file://${manifest_file}" \
              --region "${AWS_REGION}" 2>&1)"; then
              if [[ "${put_output}" != *"ImageAlreadyExistsException"* ]]; then
                echo "${put_output}" >&2
                rm -f "${manifest_file}" "${manifest_response_file}"
                return 1
              fi
              local raced_digest
              raced_digest="$(aws ecr describe-images \
                --repository-name "${ECR_REPOSITORY}" \
                --image-ids imageTag="${protection_tag}" \
                --region "${AWS_REGION}" \
                --query 'imageDetails[0].imageDigest' \
                --output text)"
              rm -f "${manifest_file}" "${manifest_response_file}"
              if [[ "${raced_digest}" != "${image_digest}" ]]; then
                echo "${put_output}" >&2
                echo "ECR protection tag ${protection_tag} raced to ${raced_digest}, expected ${image_digest}" >&2
                return 1
              fi
              echo "ECR_IMAGE_PROTECTED:${protection_tag}:${image_digest}:already-after-race"
              return 0
            fi
            rm -f "${manifest_file}" "${manifest_response_file}"
            local protected_digest
            protected_digest="$(aws ecr describe-images \
              --repository-name "${ECR_REPOSITORY}" \
              --image-ids imageTag="${protection_tag}" \
              --region "${AWS_REGION}" \
              --query 'imageDetails[0].imageDigest' \
              --output text)"
            if [[ "${protected_digest}" != "${image_digest}" ]]; then
              echo "ECR protection tag ${protection_tag} resolved to ${protected_digest}, expected ${image_digest}" >&2
              return 1
            fi
            echo "ECR_IMAGE_PROTECTED:${protection_tag}:${image_digest}:updated"
          }

          protect_ecr_image_tag "${IMAGE_IDENTIFIER}" "${ECR_CANDIDATE_TAG}"

          python - "${OWNER_PROJECT}" <<'PY' > creditnote-settings.env
          import json
          import pathlib
          import sys

          owner_project = sys.argv[1]
          settings = json.loads((pathlib.Path("projects") / owner_project / "settings.json").read_text(encoding="utf-8"))
          raw = settings.get("monthly_creditnote_export") or {}
          if not raw.get("enabled"):
              raise SystemExit("monthly_creditnote_export is disabled")
          required = ["schedule_name", "schedule_expression", "task_family", "projects", "email_to"]
          missing = [key for key in required if not raw.get(key)]
          if missing:
              raise SystemExit(f"Missing monthly_creditnote_export settings: {missing}")

          def emit(name, value):
              value = str(value or "").replace("\\", "\\\\").replace('"', '\\"')
              print(f'{name}="{value}"')

          emit("SOURCE_REPORT_SCHEDULE_NAME", settings["report_schedule"]["schedule_name"])
          emit("SCHEDULE_NAME", raw["schedule_name"])
          emit("SCHEDULE_EXPRESSION", raw["schedule_expression"])
          emit("SCHEDULE_TIMEZONE", raw.get("timezone") or "Europe/Bratislava")
          emit("TASK_FAMILY", raw["task_family"])
          emit("CREDITNOTE_PROJECTS", ",".join(raw["projects"]))
          emit("CREDITNOTE_EMAIL_TO", raw["email_to"])
          PY
          # shellcheck disable=SC1091
          source creditnote-settings.env

          ALERT_TOPIC_ARN="arn:aws:sns:${AWS_REGION}:${ACCOUNT_ID}:${ALERT_TOPIC_NAME}"
          aws sns get-topic-attributes \
            --topic-arn "${ALERT_TOPIC_ARN}" \
            --region "${AWS_REGION}" >/dev/null
          DLQ_URL="$(aws sqs get-queue-url \
            --queue-name "${DLQ_NAME}" \
            --region "${AWS_REGION}" \
            --query QueueUrl \
            --output text 2>/dev/null || aws sqs create-queue \
              --queue-name "${DLQ_NAME}" \
              --attributes MessageRetentionPeriod=1209600 \
              --region "${AWS_REGION}" \
              --query QueueUrl \
              --output text)"
          DLQ_ARN="$(aws sqs get-queue-attributes \
            --queue-url "${DLQ_URL}" \
            --attribute-names QueueArn \
            --region "${AWS_REGION}" \
            --query 'Attributes.QueueArn' \
            --output text)"
          SCHEDULE_ARN="arn:aws:scheduler:${AWS_REGION}:${ACCOUNT_ID}:schedule/default/${SCHEDULE_NAME}"
          python - "${DLQ_ARN}" "${SCHEDULE_ARN}" <<'PY' > dlq-policy.json
          import json
          import sys

          queue_arn, schedule_arn = sys.argv[1:3]
          print(json.dumps({
              "Version": "2012-10-17",
              "Statement": [{
                  "Sid": "AllowMonthlyAccountingScheduler",
                  "Effect": "Allow",
                  "Principal": {"Service": "scheduler.amazonaws.com"},
                  "Action": "sqs:SendMessage",
                  "Resource": queue_arn,
                  "Condition": {"ArnEquals": {"aws:SourceArn": schedule_arn}},
              }],
          }))
          PY
          python - <<'PY' > dlq-attributes.json
          import json
          from pathlib import Path

          policy = json.loads(Path("dlq-policy.json").read_text(encoding="utf-8"))
          print(json.dumps({
              "MessageRetentionPeriod": "1209600",
              "Policy": json.dumps(policy, separators=(",", ":")),
          }))
          PY
          aws sqs set-queue-attributes \
            --queue-url "${DLQ_URL}" \
            --attributes file://dlq-attributes.json \
            --region "${AWS_REGION}"
          aws cloudwatch put-metric-alarm \
            --alarm-name monthly-creditnote-export-dlq-not-empty \
            --alarm-description "Monthly accounting scheduler could not invoke its Fargate target" \
            --namespace AWS/SQS \
            --metric-name ApproximateNumberOfMessagesVisible \
            --dimensions Name=QueueName,Value="${DLQ_NAME}" \
            --statistic Maximum \
            --period 60 \
            --evaluation-periods 1 \
            --datapoints-to-alarm 1 \
            --threshold 1 \
            --comparison-operator GreaterThanOrEqualToThreshold \
            --treat-missing-data notBreaching \
            --alarm-actions "${ALERT_TOPIC_ARN}" \
            --ok-actions "${ALERT_TOPIC_ARN}" \
            --region "${AWS_REGION}"

          if aws scheduler get-schedule \
            --name "${SCHEDULE_NAME}" \
            --region "${AWS_REGION}" > current-monthly-schedule.json 2>/dev/null; then
            CURRENT_MONTHLY_TASK_DEFINITION_ARN="$(python - <<'PY'
          import json
          schedule = json.load(open("current-monthly-schedule.json", encoding="utf-8"))
          print(schedule["Target"]["EcsParameters"]["TaskDefinitionArn"])
          PY
            )"
            aws ecs describe-task-definition \
              --task-definition "${CURRENT_MONTHLY_TASK_DEFINITION_ARN}" \
              --region "${AWS_REGION}" > current-monthly-task-definition.json
            CURRENT_MONTHLY_IMAGE="$(python - <<'PY'
          import json
          task = json.load(open("current-monthly-task-definition.json", encoding="utf-8"))["taskDefinition"]
          print(task["containerDefinitions"][0].get("image") or "")
          PY
            )"
            if ! protect_ecr_image_tag "${CURRENT_MONTHLY_IMAGE}" "${ECR_CURRENT_TAG}"; then
              echo "Existing monthly image could not be protected; continuing with candidate recovery: ${CURRENT_MONTHLY_IMAGE}" >&2
            fi
          fi

          aws scheduler get-schedule \
            --name "${SOURCE_REPORT_SCHEDULE_NAME}" \
            --region "${AWS_REGION}" > source-schedule.json
          CLUSTER_ARN="$(python - <<'PY'
          import json
          schedule = json.load(open("source-schedule.json", encoding="utf-8"))
          print(schedule["Target"]["Arn"])
          PY
          )"
          SOURCE_TASK_DEFINITION_ARN="$(python - <<'PY'
          import json
          schedule = json.load(open("source-schedule.json", encoding="utf-8"))
          print(schedule["Target"]["EcsParameters"]["TaskDefinitionArn"])
          PY
          )"
          LAUNCH_TYPE="$(python - <<'PY'
          import json
          schedule = json.load(open("source-schedule.json", encoding="utf-8"))
          print(schedule["Target"]["EcsParameters"].get("LaunchType") or "FARGATE")
          PY
          )"
          PLATFORM_VERSION="$(python - <<'PY'
          import json
          schedule = json.load(open("source-schedule.json", encoding="utf-8"))
          print(schedule["Target"]["EcsParameters"].get("PlatformVersion") or "")
          PY
          )"
          SCHEDULE_ROLE_ARN="$(python - <<'PY'
          import json
          schedule = json.load(open("source-schedule.json", encoding="utf-8"))
          print(schedule["Target"].get("RoleArn") or "")
          PY
          )"

          aws ecs describe-task-definition \
            --task-definition "${SOURCE_TASK_DEFINITION_ARN}" \
            --region "${AWS_REGION}" > source-task-definition.json

          IFS=',' read -r -a CREDITNOTE_PROJECT_ARRAY <<< "${CREDITNOTE_PROJECTS}"
          for project in "${CREDITNOTE_PROJECT_ARRAY[@]}"; do
            schedule_name="$(python - "${project}" <<'PY'
          import json
          import pathlib
          import sys
          project = sys.argv[1]
          settings = json.loads((pathlib.Path("projects") / project / "settings.json").read_text(encoding="utf-8"))
          print(settings["report_schedule"]["schedule_name"])
          PY
            )"
            aws scheduler get-schedule \
              --name "${schedule_name}" \
              --region "${AWS_REGION}" > "source-schedule-${project}.json"
            task_definition_arn="$(python - "${project}" <<'PY'
          import json
          import sys
          project = sys.argv[1]
          schedule = json.load(open(f"source-schedule-{project}.json", encoding="utf-8"))
          print(schedule["Target"]["EcsParameters"]["TaskDefinitionArn"])
          PY
            )"
            aws ecs describe-task-definition \
              --task-definition "${task_definition_arn}" \
              --region "${AWS_REGION}" > "source-task-definition-${project}.json"
          done

          python - "${CREDITNOTE_PROJECTS}" <<'PY'
          import http.cookiejar
          import json
          import os
          import pathlib
          import re
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          projects = [item.strip() for item in sys.argv[1].split(",") if item.strip()]

          def base_url_for(project):
              settings = json.loads((pathlib.Path("projects") / project / "settings.json").read_text(encoding="utf-8"))
              api_url = str(settings.get("biznisweb_api_url") or "").strip()
              if not api_url:
                  raise SystemExit(f"{project}: biznisweb_api_url missing in settings")
              parsed = urllib.parse.urlparse(api_url)
              return f"{parsed.scheme}://{parsed.netloc}"

          def extract_arf(text):
              match = re.search(r"[?&]arf=([a-zA-Z0-9]+)", text or "")
              if not match:
                  match = re.search(
                      r"CsrfToken\s*=\s*function\s*\(\)\s*\{\s*var\s+\w+\s*=\s*'([a-zA-Z0-9]+)'",
                      text or "",
                  )
              return match.group(1) if match else ""

          for project in projects:
              prefix = project.upper().replace("-", "_")
              username = os.environ.get(f"{prefix}_BIZNISWEB_USERNAME", "")
              password = os.environ.get(f"{prefix}_BIZNISWEB_PASSWORD", "")
              if not username or not password:
                  raise SystemExit(f"{project}: GitHub Secret admin credentials are missing")
              base_url = base_url_for(project)
              opener = urllib.request.build_opener(urllib.request.HTTPCookieProcessor(http.cookiejar.CookieJar()))
              login_page = opener.open(f"{base_url}/erp/main/login", timeout=30).read().decode("utf-8", "replace")
              arf = extract_arf(login_page)
              payload = urllib.parse.urlencode(
                  {"username": username, "password": password, "res": "1890x900", "arf": arf}
              ).encode("utf-8")
              request = urllib.request.Request(
                  f"{base_url}/admin/login/authenticate/",
                  data=payload,
                  headers={"Content-Type": "application/x-www-form-urlencoded"},
              )
              try:
                  response = opener.open(request, timeout=30)
              except urllib.error.HTTPError as exc:
                  raise SystemExit(f"{project}: GitHub Secret admin login failed status={exc.code}") from exc
              if response.getcode() >= 400:
                  raise SystemExit(f"{project}: GitHub Secret admin login failed status={response.getcode()}")
              print(f"GITHUB_SECRET_ADMIN_LOGIN_OK project={project} base_url={base_url} arf_present={bool(arf)}")
          PY

          : > credential-overrides.tsv
          put_credential_override() {
            local env_name="$1"
            local value="${!env_name:-}"
            if [[ -z "${value}" ]]; then
              return
            fi
            local param_name="/biznisweb/monthly-creditnote-export/${env_name}"
            aws ssm put-parameter \
              --name "${param_name}" \
              --type SecureString \
              --value "${value}" \
              --overwrite \
              --region "${AWS_REGION}" >/dev/null
            local param_arn
            param_arn="$(aws ssm get-parameter \
              --name "${param_name}" \
              --region "${AWS_REGION}" \
              --query 'Parameter.ARN' \
              --output text)"
            printf '%s\t%s\n' "${env_name}" "${param_arn}" >> credential-overrides.tsv
          }
          put_credential_override "ROY_BIZNISWEB_USERNAME"
          put_credential_override "ROY_BIZNISWEB_PASSWORD"
          put_credential_override "VEVO_BIZNISWEB_USERNAME"
          put_credential_override "VEVO_BIZNISWEB_PASSWORD"
          python - <<'PY'
          import json
          from pathlib import Path

          overrides = {}
          path = Path("credential-overrides.tsv")
          if path.exists():
              for line in path.read_text(encoding="utf-8").splitlines():
                  if not line.strip():
                      continue
                  name, arn = line.split("\t", 1)
                  overrides[name] = arn
          Path("credential-overrides.json").write_text(json.dumps(overrides, sort_keys=True), encoding="utf-8")
          print(json.dumps({"credential_override_count": len(overrides)}, sort_keys=True))
          PY

          LOG_GROUP="/ecs/${TASK_FAMILY}"
          aws logs create-log-group --log-group-name "${LOG_GROUP}" --region "${AWS_REGION}" 2>/dev/null || true
          aws logs put-retention-policy \
            --log-group-name "${LOG_GROUP}" \
            --retention-in-days 30 \
            --region "${AWS_REGION}"
          aws logs put-metric-filter \
            --log-group-name "${LOG_GROUP}" \
            --filter-name monthly-creditnote-export-run-failed \
            --filter-pattern '"CREDITNOTE_EXPORT_RUN_FAILED"' \
            --metric-transformations \
              metricName=MonthlyCreditnoteExportRunFailed,metricNamespace=BiznisWebReporting,metricValue=1,defaultValue=0 \
            --region "${AWS_REGION}"
          aws cloudwatch put-metric-alarm \
            --alarm-name monthly-creditnote-export-run-failed \
            --alarm-description "Monthly accounting export application failed before sending email" \
            --namespace BiznisWebReporting \
            --metric-name MonthlyCreditnoteExportRunFailed \
            --statistic Sum \
            --period 60 \
            --evaluation-periods 1 \
            --datapoints-to-alarm 1 \
            --threshold 1 \
            --comparison-operator GreaterThanOrEqualToThreshold \
            --treat-missing-data notBreaching \
            --alarm-actions "${ALERT_TOPIC_ARN}" \
            --ok-actions "${ALERT_TOPIC_ARN}" \
            --region "${AWS_REGION}"

          python - "${TASK_FAMILY}" "${IMAGE_IDENTIFIER}" "${OWNER_PROJECT}" "${CREDITNOTE_PROJECTS}" "${CREDITNOTE_EMAIL_TO}" "${LOG_GROUP}" "${AWS_REGION}" <<'PY' > task-definition-creditnote.json
          import copy
          import json
          import pathlib
          import sys

          task_family, image_identifier, owner_project, projects_csv, email_to, log_group, region = sys.argv[1:8]
          projects = [item.strip() for item in projects_csv.split(",") if item.strip()]
          source = json.load(open("source-task-definition.json", encoding="utf-8"))["taskDefinition"]
          allowed = {
              "taskRoleArn",
              "executionRoleArn",
              "networkMode",
              "containerDefinitions",
              "volumes",
              "placementConstraints",
              "requiresCompatibilities",
              "cpu",
              "memory",
              "ipcMode",
              "pidMode",
              "proxyConfiguration",
              "inferenceAccelerators",
              "ephemeralStorage",
              "runtimePlatform",
          }
          task = {key: copy.deepcopy(value) for key, value in source.items() if key in allowed and value not in (None, [], {})}
          task["family"] = task_family
          container = task["containerDefinitions"][0]
          container["image"] = image_identifier
          container["command"] = ["python", "monthly_creditnote_export_runner.py", "--owner-project", owner_project]
          credential_names = {"BIZNISWEB_USERNAME", "BIZNISWEB_PASSWORD", "BIZNISWEB_API_TOKEN", "BIZNISWEB_API_URL"}

          env = [
              item for item in container.get("environment", [])
              if item.get("name") not in credential_names
              and item.get("name") not in {
                  "REPORT_PROJECT",
                  "REPORT_OUTPUT_TAG",
                  "REPORT_SKIP_INVOICES",
                  "CREDITNOTE_EXPORT_PROJECTS",
                  "CREDITNOTE_EXPORT_EMAIL_TO",
                  "CREDITNOTE_EXPORT_OWNER_PROJECT",
              }
          ]
          secrets = [
              item for item in container.get("secrets", [])
              if item.get("name") not in credential_names
              and not item.get("name", "").startswith(("ROY_", "VEVO_"))
          ]
          credential_overrides = {}
          override_path = pathlib.Path("credential-overrides.json")
          if override_path.exists():
              credential_overrides = json.loads(override_path.read_text(encoding="utf-8"))

          for project in projects:
              prefix = project.upper().replace("-", "_")
              path = pathlib.Path(f"source-task-definition-{project}.json")
              if not path.exists():
                  continue
              source_task = json.loads(path.read_text(encoding="utf-8"))["taskDefinition"]
              source_container = source_task["containerDefinitions"][0]
              for item in source_container.get("environment", []):
                  name = item.get("name")
                  if name in credential_names:
                      env.append({"name": f"{prefix}_{name}", "value": item.get("value", "")})
              for item in source_container.get("secrets", []):
                  name = item.get("name")
                  if name in credential_names:
                      secrets.append({"name": f"{prefix}_{name}", "valueFrom": item.get("valueFrom", "")})

          if credential_overrides:
              env = [item for item in env if item.get("name") not in credential_overrides]
              secrets = [item for item in secrets if item.get("name") not in credential_overrides]
              for name, value_from in sorted(credential_overrides.items()):
                  if value_from:
                      secrets.append({"name": name, "valueFrom": value_from})

          env.extend(
              [
                  {"name": "REPORT_PROJECT", "value": owner_project},
                  {"name": "REPORT_SKIP_PROJECT_ENV", "value": "true"},
                  {"name": "CREDITNOTE_EXPORT_OWNER_PROJECT", "value": owner_project},
                  {"name": "CREDITNOTE_EXPORT_PROJECTS", "value": projects_csv},
                  {"name": "CREDITNOTE_EXPORT_EMAIL_TO", "value": email_to},
              ]
          )
          container["environment"] = env
          if secrets:
              deduped_by_name = {}
              for item in secrets:
                  name = item.get("name")
                  value_from = item.get("valueFrom")
                  if not name or not value_from:
                      continue
                  deduped_by_name[name] = item
              container["secrets"] = list(deduped_by_name.values())
          container["logConfiguration"] = {
              "logDriver": "awslogs",
              "options": {
                  "awslogs-group": log_group,
                  "awslogs-region": region,
                  "awslogs-stream-prefix": "ecs",
              },
          }
          json.dump(task, sys.stdout)
          PY

          REGISTERED_TASK_DEFINITION_ARN="$(aws ecs register-task-definition \
            --cli-input-json file://task-definition-creditnote.json \
            --region "${AWS_REGION}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"
          aws ecs describe-task-definition \
            --task-definition "${REGISTERED_TASK_DEFINITION_ARN}" \
            --region "${AWS_REGION}" > task-definition-creditnote-registered.json
          python - "${CREDITNOTE_PROJECTS}" <<'PY'
          import json
          import sys

          projects = [item.strip() for item in sys.argv[1].split(",") if item.strip()]
          required_secrets = {
