name: Deploy Live Dashboard App Runner

on:
  workflow_dispatch:
    inputs:
      project:
        description: Reporting project slug
        required: true
        default: vevo
      service_name:
        description: App Runner service name
        required: true
        default: biznisweb-vevo-production-board
      auth_user:
        description: Basic Auth username fallback; project settings can override it
        required: true
        default: vevo
      s3_bucket:
        description: Optional S3 bucket for latest report artifacts
        required: false
        default: ""
      s3_prefix:
        description: Optional S3 prefix for latest report artifacts
        required: false
        default: ""
      skip_artifact_refresh:
        description: Skip report artifact regeneration and run only a lightweight host marker check
        required: false
        default: "false"

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: vevo-reporting
  IMAGE_TAG: latest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: live-dashboard-deploy-${{ inputs.project }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy App Runner service
        shell: bash
        env:
          PROJECT: ${{ inputs.project }}
          SERVICE_NAME: ${{ inputs.service_name }}
          AUTH_USER: ${{ inputs.auth_user }}
          DEFAULT_AUTH_PASSWORD: ${{ secrets.LIVE_DASHBOARD_AUTH_PASSWORD }}
          ROY_AUTH_PASSWORD: ${{ secrets.ROY_LIVE_DASHBOARD_AUTH_PASSWORD }}
          INPUT_S3_BUCKET: ${{ inputs.s3_bucket }}
          INPUT_S3_PREFIX: ${{ inputs.s3_prefix }}
          SKIP_ARTIFACT_REFRESH: ${{ inputs.skip_artifact_refresh }}
        run: |
          set -euo pipefail
          PROJECT="$(printf '%s' "${PROJECT}" | tr '[:upper:]' '[:lower:]')"
          TASK_FAMILY="${PROJECT}-reporting-daily"

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}"
          IMAGE_DIGEST="$(aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --region "${AWS_REGION}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          IMAGE_IDENTIFIER="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}@${IMAGE_DIGEST}"

          protect_ecr_image_tag() {
            local image_identifier="$1"
            local protection_tag="$2"
            if [[ "${image_identifier}" != *@sha256:* ]]; then
              echo "Skipping ${protection_tag}; image is not digest-pinned: ${image_identifier}"
              return 0
            fi
            local image_digest="${image_identifier##*@}"
            local existing_digest
            existing_digest="$(aws ecr describe-images \
              --repository-name "${ECR_REPOSITORY}" \
              --image-ids imageTag="${protection_tag}" \
              --region "${AWS_REGION}" \
              --query 'imageDetails[0].imageDigest' \
              --output text 2>/dev/null || true)"
            if [[ "${existing_digest}" == "${image_digest}" ]]; then
              echo "ECR_IMAGE_PROTECTED:${protection_tag}:${image_digest}:already"
              return 0
            fi
            local manifest_file
            local manifest_response_file
            manifest_file="$(mktemp)"
            manifest_response_file="$(mktemp)"
            aws ecr batch-get-image \
              --repository-name "${ECR_REPOSITORY}" \
              --image-ids imageDigest="${image_digest}" \
              --region "${AWS_REGION}" \
              --output json > "${manifest_response_file}"
            python - "${manifest_response_file}" "${manifest_file}" <<'PY'
          import json
          import pathlib
          import sys

          response = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          images = response.get("images") or []
          if not images or not images[0].get("imageManifest"):
              raise SystemExit("ECR batch-get-image did not return an image manifest")
          pathlib.Path(sys.argv[2]).write_text(images[0]["imageManifest"], encoding="utf-8")
          PY
            python -m json.tool "${manifest_file}" >/dev/null
            local put_output
            if ! put_output="$(aws ecr put-image \
              --repository-name "${ECR_REPOSITORY}" \
              --image-tag "${protection_tag}" \
              --image-manifest "file://${manifest_file}" \
              --region "${AWS_REGION}" 2>&1)"; then
              if [[ "${put_output}" != *"ImageAlreadyExistsException"* ]]; then
                echo "${put_output}" >&2
                rm -f "${manifest_file}" "${manifest_response_file}"
                return 1
              fi
              local raced_digest
              raced_digest="$(aws ecr describe-images \
                --repository-name "${ECR_REPOSITORY}" \
                --image-ids imageTag="${protection_tag}" \
                --region "${AWS_REGION}" \
                --query 'imageDetails[0].imageDigest' \
                --output text)"
              rm -f "${manifest_file}" "${manifest_response_file}"
              if [[ "${raced_digest}" != "${image_digest}" ]]; then
                echo "${put_output}" >&2
                echo "ECR protection tag ${protection_tag} raced to ${raced_digest}, expected ${image_digest}" >&2
                return 1
              fi
              echo "ECR_IMAGE_PROTECTED:${protection_tag}:${image_digest}:already-after-race"
              return 0
            fi
            rm -f "${manifest_file}" "${manifest_response_file}"
            local protected_digest
            protected_digest="$(aws ecr describe-images \
              --repository-name "${ECR_REPOSITORY}" \
              --image-ids imageTag="${protection_tag}" \
              --region "${AWS_REGION}" \
              --query 'imageDetails[0].imageDigest' \
              --output text)"
            if [[ "${protected_digest}" != "${image_digest}" ]]; then
              echo "ECR protection tag ${protection_tag} resolved to ${protected_digest}, expected ${image_digest}" >&2
              exit 1
            fi
            echo "ECR_IMAGE_PROTECTED:${protection_tag}:${image_digest}:updated"
          }

          protect_current_daily_schedule_image() {
            local report_project="$1"
            local schedule_name
            local expected_task_family
            schedule_name="$(python - "${report_project}" <<'PY'
          import json
          import pathlib
          import sys
          project = sys.argv[1]
          settings = json.loads((pathlib.Path("projects") / project / "settings.json").read_text(encoding="utf-8"))
          print(settings["report_schedule"]["schedule_name"])
          PY
            )"
            expected_task_family="$(python - "${report_project}" <<'PY'
          import json
          import pathlib
          import sys
          project = sys.argv[1]
          settings = json.loads((pathlib.Path("projects") / project / "settings.json").read_text(encoding="utf-8"))
          print(settings["report_schedule"]["task_family"])
          PY
            )"
            aws scheduler get-schedule \
              --name "${schedule_name}" \
              --region "${AWS_REGION}" > "schedule-${report_project}.json"
            local task_definition_arn
            task_definition_arn="$(python - "${report_project}" <<'PY'
          import json
          import sys
          project = sys.argv[1]
          schedule = json.load(open(f"schedule-{project}.json", encoding="utf-8"))
          print(schedule["Target"]["EcsParameters"]["TaskDefinitionArn"])
          PY
            )"
            if [[ "${task_definition_arn}" != *":task-definition/${expected_task_family}:"* ]]; then
              echo "Schedule ${schedule_name} targets ${task_definition_arn}, expected family ${expected_task_family}" >&2
              exit 1
            fi
            aws ecs describe-task-definition \
              --task-definition "${task_definition_arn}" \
              --region "${AWS_REGION}" > "task-definition-${report_project}.json"
            local task_image
            task_image="$(python - "${report_project}" <<'PY'
          import json
          import sys
          project = sys.argv[1]
          task_def = json.load(open(f"task-definition-{project}.json", encoding="utf-8"))["taskDefinition"]
          print(task_def["containerDefinitions"][0].get("image") or "")
          PY
            )"
            protect_ecr_image_tag "${task_image}" "${expected_task_family}-current"
          }

          for REPORT_PROJECT in vevo roy; do
            protect_current_daily_schedule_image "${REPORT_PROJECT}"
          done

          REPORT_SCHEDULE_NAME="$(python - "${PROJECT}" <<'PY'
          import json
          import pathlib
          import sys
          project = sys.argv[1]
          settings_path = pathlib.Path("projects") / project / "settings.json"
          settings = json.loads(settings_path.read_text(encoding="utf-8"))
          print(settings["report_schedule"]["schedule_name"])
          PY
          )"
          CONFIGURED_AUTH_USER="$(python - "${PROJECT}" <<'PY'
          import json
          import pathlib
          import sys
          project = sys.argv[1]
          settings_path = pathlib.Path("projects") / project / "settings.json"
          settings = json.loads(settings_path.read_text(encoding="utf-8"))
          live_dashboard = settings.get("live_dashboard") or {}
          print(str(live_dashboard.get("auth_user") or "").strip())
          PY
          )"
          if [[ -n "${CONFIGURED_AUTH_USER}" ]]; then
            if [[ "${AUTH_USER}" != "${CONFIGURED_AUTH_USER}" ]]; then
              echo "Using configured live dashboard auth user for ${PROJECT}; workflow input auth_user is ignored." >&2
            fi
            AUTH_USER="${CONFIGURED_AUTH_USER}"
          fi
          aws scheduler get-schedule \
            --name "${REPORT_SCHEDULE_NAME}" \
            --region "${AWS_REGION}" > schedule.json
          TASK_DEFINITION_ARN="$(python - <<'PY'
          import json
          schedule = json.load(open("schedule.json", encoding="utf-8"))
          print(schedule["Target"]["EcsParameters"]["TaskDefinitionArn"])
          PY
          )"
          if [[ "${TASK_DEFINITION_ARN}" != *":task-definition/${TASK_FAMILY}:"* ]]; then
            echo "Schedule ${REPORT_SCHEDULE_NAME} targets ${TASK_DEFINITION_ARN}, expected family ${TASK_FAMILY}" >&2
            exit 1
          fi
          CURRENT_SCHEDULE_TASK_DEFINITION_ARN="${TASK_DEFINITION_ARN}"
          aws ecs describe-task-definition \
            --task-definition "${TASK_DEFINITION_ARN}" \
            --region "${AWS_REGION}" > task-definition.json

          BIZNISWEB_TOKEN_REF="$(python - <<'PY'
          import json
          task_def = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          container = task_def["containerDefinitions"][0]
          for secret in container.get("secrets", []):
              if secret.get("name") == "BIZNISWEB_API_TOKEN":
                  print(secret["valueFrom"])
                  raise SystemExit(0)
          raise SystemExit("BIZNISWEB_API_TOKEN secret not found in task definition")
          PY
          )"
          if [[ "${BIZNISWEB_TOKEN_REF}" != arn:* ]]; then
            if aws ssm get-parameter --name "${BIZNISWEB_TOKEN_REF}" --region "${AWS_REGION}" >/tmp/token-parameter.json 2>/dev/null; then
              BIZNISWEB_TOKEN_REF="$(python - <<'PY'
          import json
          print(json.load(open("/tmp/token-parameter.json", encoding="utf-8"))["Parameter"]["ARN"])
          PY
              )"
            else
              BIZNISWEB_TOKEN_REF="$(aws secretsmanager describe-secret \
                --secret-id "${BIZNISWEB_TOKEN_REF}" \
                --region "${AWS_REGION}" \
                --query ARN \
                --output text)"
            fi
          fi
          BIZNISWEB_TOKEN_POLICY_REF="$(python - "${BIZNISWEB_TOKEN_REF}" <<'PY'
          import sys
          raw = sys.argv[1]
          parts = raw.split(":")
          if len(parts) > 7 and len(parts) >= 6 and parts[2] == "secretsmanager" and parts[5] == "secret":
              print(":".join(parts[:7]))
          else:
              print(raw)
          PY
          )"

          REPORT_S3_BUCKET_VALUE="${INPUT_S3_BUCKET:-}"
          REPORT_S3_PREFIX_VALUE="${INPUT_S3_PREFIX:-}"
          if [[ -z "${REPORT_S3_BUCKET_VALUE}" || -z "${REPORT_S3_PREFIX_VALUE}" ]]; then
            python - <<'PY' > /tmp/task-env.json
          import json
          task_def = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          env = {item.get("name"): item.get("value") for item in task_def["containerDefinitions"][0].get("environment", [])}
          print(json.dumps(env))
          PY
            if [[ -z "${REPORT_S3_BUCKET_VALUE}" ]]; then
              REPORT_S3_BUCKET_VALUE="$(python - <<'PY'
          import json
          env = json.load(open("/tmp/task-env.json", encoding="utf-8"))
          print(env.get("REPORT_S3_BUCKET") or "")
          PY
              )"
            fi
            if [[ -z "${REPORT_S3_PREFIX_VALUE}" ]]; then
              REPORT_S3_PREFIX_VALUE="$(python - "${PROJECT}" <<'PY'
          import json, sys
          project = sys.argv[1]
          env = json.load(open("/tmp/task-env.json", encoding="utf-8"))
          print(env.get("REPORT_S3_PREFIX") or ("daily-reports/roy-sk" if project == "roy" else f"daily-reports/{project}"))
          PY
              )"
            fi
          fi
          if [[ ( "${PROJECT}" == "roy" || "${PROJECT}" == "vevo" ) && -z "${REPORT_S3_BUCKET_VALUE}" ]]; then
            REPORT_S3_BUCKET_VALUE="biznisweb-reporting-artifacts-${ACCOUNT_ID}-${AWS_REGION}"
          fi
          REPORT_S3_PREFIX_VALUE="${REPORT_S3_PREFIX_VALUE:-daily-reports/${PROJECT}}"
          REPORT_S3_PREFIX_VALUE="${REPORT_S3_PREFIX_VALUE#/}"
          REPORT_S3_PREFIX_VALUE="${REPORT_S3_PREFIX_VALUE%/}"
          if [[ ( "${PROJECT}" == "roy" || "${PROJECT}" == "vevo" ) && -z "${REPORT_S3_BUCKET_VALUE}" ]]; then
            echo "${PROJECT} App Runner requires REPORT_S3_BUCKET or an input s3_bucket for latest KPI artifacts." >&2
            exit 1
          fi

          if [[ -n "${REPORT_S3_BUCKET_VALUE}" ]]; then
            if ! aws s3api head-bucket --bucket "${REPORT_S3_BUCKET_VALUE}" >/dev/null 2>&1; then
              if [[ "${AWS_REGION}" == "us-east-1" ]]; then
                aws s3api create-bucket --bucket "${REPORT_S3_BUCKET_VALUE}" >/dev/null
              else
                aws s3api create-bucket \
                  --bucket "${REPORT_S3_BUCKET_VALUE}" \
                  --create-bucket-configuration LocationConstraint="${AWS_REGION}" >/dev/null
              fi
            fi
            aws s3api put-public-access-block \
              --bucket "${REPORT_S3_BUCKET_VALUE}" \
              --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            aws s3api put-bucket-encryption \
              --bucket "${REPORT_S3_BUCKET_VALUE}" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

          if [[ -n "${REPORT_S3_BUCKET_VALUE}" ]]; then
            SOURCE_TASK_ROLE_ARN="$(python - <<'PY'
          import json
          task_def = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          print(task_def.get("taskRoleArn") or "")
          PY
            )"
            if [[ -z "${SOURCE_TASK_ROLE_ARN}" ]]; then
              echo "${PROJECT} reporting task definition has no taskRoleArn; cannot grant S3 artifact upload access." >&2
              exit 1
            fi
            SOURCE_TASK_ROLE_NAME="$(python - "${SOURCE_TASK_ROLE_ARN}" <<'PY'
          import sys
          print(sys.argv[1].rsplit("/", 1)[-1])
          PY
            )"
            PROJECT_TASK_ROLE_NAME="BiznisWebReportingTaskRole-${PROJECT}"
            cat > reporting-task-role-trust.json <<'JSON'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {"Service": "ecs-tasks.amazonaws.com"},
                "Action": "sts:AssumeRole"
              }
            ]
          }
          JSON
            if ! aws iam get-role --role-name "${PROJECT_TASK_ROLE_NAME}" >/dev/null 2>&1; then
              aws iam create-role \
                --role-name "${PROJECT_TASK_ROLE_NAME}" \
                --description "Dedicated ${PROJECT} reporting ECS task role" \
                --assume-role-policy-document file://reporting-task-role-trust.json \
                --tags "Key=Project,Value=biznisweb" "Key=Component,Value=${PROJECT}-reporting" >/dev/null
            else
              aws iam update-assume-role-policy \
                --role-name "${PROJECT_TASK_ROLE_NAME}" \
                --policy-document file://reporting-task-role-trust.json
            fi
            aws iam wait role-exists --role-name "${PROJECT_TASK_ROLE_NAME}"

            SOURCE_MANAGED_POLICY_ARNS="$(aws iam list-attached-role-policies \
              --role-name "${SOURCE_TASK_ROLE_NAME}" \
              --query 'AttachedPolicies[].PolicyArn' \
              --output text)"
            for POLICY_ARN in ${SOURCE_MANAGED_POLICY_ARNS}; do
              if [[ "${POLICY_ARN}" == "None" ]]; then
                continue
              fi
              aws iam attach-role-policy \
                --role-name "${PROJECT_TASK_ROLE_NAME}" \
                --policy-arn "${POLICY_ARN}"
            done

            SOURCE_INLINE_POLICY_NAMES="$(aws iam list-role-policies \
              --role-name "${SOURCE_TASK_ROLE_NAME}" \
              --query 'PolicyNames' \
              --output text)"
            for POLICY_NAME in ${SOURCE_INLINE_POLICY_NAMES}; do
              if [[ "${POLICY_NAME}" == "None" || "${POLICY_NAME}" == ReportingLiveDashboardArtifacts* ]]; then
                continue
              fi
              aws iam get-role-policy \
                --role-name "${SOURCE_TASK_ROLE_NAME}" \
                --policy-name "${POLICY_NAME}" \
                --query PolicyDocument \
                --output json > source-task-role-policy.json
              aws iam put-role-policy \
                --role-name "${PROJECT_TASK_ROLE_NAME}" \
                --policy-name "${POLICY_NAME}" \
                --policy-document file://source-task-role-policy.json
            done

            DESIRED_ARTIFACT_POLICY_NAME="ReportingLiveDashboardArtifacts-${PROJECT}"
            PROJECT_INLINE_POLICY_NAMES="$(aws iam list-role-policies \
              --role-name "${PROJECT_TASK_ROLE_NAME}" \
              --query 'PolicyNames' \
              --output text)"
            for POLICY_NAME in ${PROJECT_INLINE_POLICY_NAMES}; do
              if [[ "${POLICY_NAME}" == ReportingLiveDashboardArtifacts* && "${POLICY_NAME}" != "${DESIRED_ARTIFACT_POLICY_NAME}" ]]; then
                aws iam delete-role-policy \
                  --role-name "${PROJECT_TASK_ROLE_NAME}" \
                  --policy-name "${POLICY_NAME}"
              fi
            done

            cat > reporting-artifacts-policy.json <<JSON
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": ["s3:ListBucket"],
                "Resource": "arn:aws:s3:::${REPORT_S3_BUCKET_VALUE}",
                "Condition": {
                  "StringLike": {
                    "s3:prefix": [
                      "${REPORT_S3_PREFIX_VALUE}/*",
                      "${REPORT_S3_PREFIX_VALUE}"
                    ]
                  }
                }
              },
              {
                "Effect": "Allow",
                "Action": ["s3:GetObject", "s3:PutObject"],
                "Resource": "arn:aws:s3:::${REPORT_S3_BUCKET_VALUE}/${REPORT_S3_PREFIX_VALUE}/*"
              }
            ]
          }
          JSON
            aws iam put-role-policy \
              --role-name "${PROJECT_TASK_ROLE_NAME}" \
              --policy-name "${DESIRED_ARTIFACT_POLICY_NAME}" \
              --policy-document file://reporting-artifacts-policy.json
            PROJECT_TASK_ROLE_ARN="$(aws iam get-role \
              --role-name "${PROJECT_TASK_ROLE_NAME}" \
              --query 'Role.Arn' \
              --output text)"

            NEEDS_REPORT_TASK_UPDATE="$(python - "${REPORT_S3_BUCKET_VALUE}" "${REPORT_S3_PREFIX_VALUE}" "${IMAGE_IDENTIFIER}" "${PROJECT_TASK_ROLE_ARN}" <<'PY'
          import json
          import sys
          bucket, prefix, image_identifier, task_role_arn = sys.argv[1:5]
          task_def = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          container = task_def["containerDefinitions"][0]
          env = {
              item.get("name"): item.get("value")
              for item in container.get("environment", [])
          }
          secret_names = {
              item.get("name")
              for item in container.get("secrets", [])
          }
          has_conflicting_secret = bool({"REPORT_S3_BUCKET", "REPORT_S3_PREFIX"} & secret_names)
          image_mismatch = container.get("image") != image_identifier
          needs_update = (
              has_conflicting_secret
              or env.get("REPORT_S3_BUCKET") != bucket
              or env.get("REPORT_S3_PREFIX") != prefix
              or image_mismatch
              or task_def.get("taskRoleArn") != task_role_arn
          )
          print("true" if needs_update else "false")
          PY
            )"
            if [[ "${NEEDS_REPORT_TASK_UPDATE}" == "true" ]]; then
              python - "${REPORT_S3_BUCKET_VALUE}" "${REPORT_S3_PREFIX_VALUE}" "${IMAGE_IDENTIFIER}" "${PROJECT_TASK_ROLE_ARN}" <<'PY' > task-definition-s3.json
          import copy
          import json
          import sys

          bucket, prefix, image_identifier, task_role_arn = sys.argv[1:5]
          source = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          allowed = {
              "family",
              "taskRoleArn",
              "executionRoleArn",
              "networkMode",
              "containerDefinitions",
              "volumes",
              "placementConstraints",
              "requiresCompatibilities",
              "cpu",
              "memory",
              "ipcMode",
              "pidMode",
              "proxyConfiguration",
              "inferenceAccelerators",
              "ephemeralStorage",
              "runtimePlatform",
          }
          task = {key: copy.deepcopy(value) for key, value in source.items() if key in allowed and value not in (None, [], {})}
          task["taskRoleArn"] = task_role_arn
          container = task["containerDefinitions"][0]
          container["image"] = image_identifier
          env = [item for item in container.get("environment", []) if item.get("name") not in {"REPORT_S3_BUCKET", "REPORT_S3_PREFIX"}]
          env.extend([
              {"name": "REPORT_S3_BUCKET", "value": bucket},
              {"name": "REPORT_S3_PREFIX", "value": prefix},
          ])
          container["environment"] = env
          container["secrets"] = [
              item
              for item in container.get("secrets", [])
              if item.get("name") not in {"REPORT_S3_BUCKET", "REPORT_S3_PREFIX"}
          ]
          json.dump(task, sys.stdout)
          PY
              REGISTERED_TASK_DEFINITION_ARN="$(aws ecs register-task-definition \
                --cli-input-json file://task-definition-s3.json \
                --region "${AWS_REGION}" \
                --query 'taskDefinition.taskDefinitionArn' \
                --output text)"
              TASK_DEFINITION_ARN="${REGISTERED_TASK_DEFINITION_ARN}"
              aws ecs describe-task-definition \
                --task-definition "${TASK_DEFINITION_ARN}" \
                --region "${AWS_REGION}" > task-definition.json
            fi
            protect_ecr_image_tag "${IMAGE_IDENTIFIER}" "${TASK_FAMILY}-candidate"

            CLUSTER_ARN="$(python - <<'PY'
          import json
          schedule = json.load(open("schedule.json", encoding="utf-8"))
          print(schedule["Target"]["Arn"])
          PY
            )"
            LAUNCH_TYPE="$(python - <<'PY'
          import json
          schedule = json.load(open("schedule.json", encoding="utf-8"))
          print(schedule["Target"]["EcsParameters"].get("LaunchType") or "FARGATE")
          PY
            )"
            PLATFORM_VERSION="$(python - <<'PY'
          import json
          schedule = json.load(open("schedule.json", encoding="utf-8"))
          print(schedule["Target"]["EcsParameters"].get("PlatformVersion") or "")
          PY
            )"
            python - <<'PY' > network.json
          import json
          schedule = json.load(open("schedule.json", encoding="utf-8"))
          raw = schedule["Target"]["EcsParameters"]["NetworkConfiguration"]["awsvpcConfiguration"]
          normalized = {
              "awsvpcConfiguration": {
                  "subnets": raw.get("Subnets") or raw.get("subnets") or [],
                  "securityGroups": raw.get("SecurityGroups") or raw.get("securityGroups") or [],
                  "assignPublicIp": raw.get("AssignPublicIp") or raw.get("assignPublicIp") or "DISABLED",
              }
          }
          print(json.dumps(normalized))
          PY
            CONTAINER_NAME="$(python - <<'PY'
          import json
          task_def = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          print(task_def["containerDefinitions"][0]["name"])
          PY
            )"
            LOG_GROUP="$(python - <<'PY'
          import json
          task_def = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
