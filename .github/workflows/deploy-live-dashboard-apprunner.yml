name: Deploy Live Dashboard App Runner

on:
  workflow_dispatch:
    inputs:
      project:
        description: Reporting project slug
        required: true
        default: vevo
      service_name:
        description: App Runner service name
        required: true
        default: biznisweb-vevo-production-board
      auth_user:
        description: Basic Auth username fallback; project settings can override it
        required: true
        default: vevo
      s3_bucket:
        description: Optional S3 bucket for latest report artifacts
        required: false
        default: ""
      s3_prefix:
        description: Optional S3 prefix for latest report artifacts
        required: false
        default: ""
      skip_artifact_refresh:
        description: Skip ROY report artifact regeneration and run only a lightweight host marker check
        required: false
        default: "false"

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: vevo-reporting
  IMAGE_TAG: latest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy App Runner service
        shell: bash
        env:
          PROJECT: ${{ inputs.project }}
          SERVICE_NAME: ${{ inputs.service_name }}
          AUTH_USER: ${{ inputs.auth_user }}
          DEFAULT_AUTH_PASSWORD: ${{ secrets.LIVE_DASHBOARD_AUTH_PASSWORD }}
          ROY_AUTH_PASSWORD: ${{ secrets.ROY_LIVE_DASHBOARD_AUTH_PASSWORD }}
          INPUT_S3_BUCKET: ${{ inputs.s3_bucket }}
          INPUT_S3_PREFIX: ${{ inputs.s3_prefix }}
          SKIP_ARTIFACT_REFRESH: ${{ inputs.skip_artifact_refresh }}
        run: |
          set -euo pipefail
          PROJECT="$(printf '%s' "${PROJECT}" | tr '[:upper:]' '[:lower:]')"
          TASK_FAMILY="${PROJECT}-reporting-daily"

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          IMAGE_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}"
          IMAGE_DIGEST="$(aws ecr describe-images \
            --repository-name "${ECR_REPOSITORY}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --region "${AWS_REGION}" \
            --query 'imageDetails[0].imageDigest' \
            --output text)"
          IMAGE_IDENTIFIER="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}@${IMAGE_DIGEST}"

          REPORT_SCHEDULE_NAME="$(python - "${PROJECT}" <<'PY'
          import json
          import pathlib
          import sys
          project = sys.argv[1]
          settings_path = pathlib.Path("projects") / project / "settings.json"
          settings = json.loads(settings_path.read_text(encoding="utf-8"))
          print(settings["report_schedule"]["schedule_name"])
          PY
          )"
          CONFIGURED_AUTH_USER="$(python - "${PROJECT}" <<'PY'
          import json
          import pathlib
          import sys
          project = sys.argv[1]
          settings_path = pathlib.Path("projects") / project / "settings.json"
          settings = json.loads(settings_path.read_text(encoding="utf-8"))
          live_dashboard = settings.get("live_dashboard") or {}
          print(str(live_dashboard.get("auth_user") or "").strip())
          PY
          )"
          if [[ -n "${CONFIGURED_AUTH_USER}" ]]; then
            if [[ "${AUTH_USER}" != "${CONFIGURED_AUTH_USER}" ]]; then
              echo "Using configured live dashboard auth user for ${PROJECT}; workflow input auth_user is ignored." >&2
            fi
            AUTH_USER="${CONFIGURED_AUTH_USER}"
          fi
          aws scheduler get-schedule \
            --name "${REPORT_SCHEDULE_NAME}" \
            --region "${AWS_REGION}" > schedule.json
          TASK_DEFINITION_ARN="$(python - <<'PY'
          import json
          schedule = json.load(open("schedule.json", encoding="utf-8"))
          print(schedule["Target"]["EcsParameters"]["TaskDefinitionArn"])
          PY
          )"
          if [[ "${TASK_DEFINITION_ARN}" != *":task-definition/${TASK_FAMILY}:"* ]]; then
            echo "Schedule ${REPORT_SCHEDULE_NAME} targets ${TASK_DEFINITION_ARN}, expected family ${TASK_FAMILY}" >&2
            exit 1
          fi
          aws ecs describe-task-definition \
            --task-definition "${TASK_DEFINITION_ARN}" \
            --region "${AWS_REGION}" > task-definition.json

          BIZNISWEB_TOKEN_REF="$(python - <<'PY'
          import json
          task_def = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          container = task_def["containerDefinitions"][0]
          for secret in container.get("secrets", []):
              if secret.get("name") == "BIZNISWEB_API_TOKEN":
                  print(secret["valueFrom"])
                  raise SystemExit(0)
          raise SystemExit("BIZNISWEB_API_TOKEN secret not found in task definition")
          PY
          )"
          if [[ "${BIZNISWEB_TOKEN_REF}" != arn:* ]]; then
            if aws ssm get-parameter --name "${BIZNISWEB_TOKEN_REF}" --region "${AWS_REGION}" >/tmp/token-parameter.json 2>/dev/null; then
              BIZNISWEB_TOKEN_REF="$(python - <<'PY'
          import json
          print(json.load(open("/tmp/token-parameter.json", encoding="utf-8"))["Parameter"]["ARN"])
          PY
              )"
            else
              BIZNISWEB_TOKEN_REF="$(aws secretsmanager describe-secret \
                --secret-id "${BIZNISWEB_TOKEN_REF}" \
                --region "${AWS_REGION}" \
                --query ARN \
                --output text)"
            fi
          fi
          BIZNISWEB_TOKEN_POLICY_REF="$(python - "${BIZNISWEB_TOKEN_REF}" <<'PY'
          import sys
          raw = sys.argv[1]
          parts = raw.split(":")
          if len(parts) > 7 and len(parts) >= 6 and parts[2] == "secretsmanager" and parts[5] == "secret":
              print(":".join(parts[:7]))
          else:
              print(raw)
          PY
          )"

          REPORT_S3_BUCKET_VALUE="${INPUT_S3_BUCKET:-}"
          REPORT_S3_PREFIX_VALUE="${INPUT_S3_PREFIX:-}"
          if [[ -z "${REPORT_S3_BUCKET_VALUE}" || -z "${REPORT_S3_PREFIX_VALUE}" ]]; then
            python - <<'PY' > /tmp/task-env.json
          import json
          task_def = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          env = {item.get("name"): item.get("value") for item in task_def["containerDefinitions"][0].get("environment", [])}
          print(json.dumps(env))
          PY
            if [[ -z "${REPORT_S3_BUCKET_VALUE}" ]]; then
              REPORT_S3_BUCKET_VALUE="$(python - <<'PY'
          import json
          env = json.load(open("/tmp/task-env.json", encoding="utf-8"))
          print(env.get("REPORT_S3_BUCKET") or "")
          PY
              )"
            fi
            if [[ -z "${REPORT_S3_PREFIX_VALUE}" ]]; then
              REPORT_S3_PREFIX_VALUE="$(python - "${PROJECT}" <<'PY'
          import json, sys
          project = sys.argv[1]
          env = json.load(open("/tmp/task-env.json", encoding="utf-8"))
          print(env.get("REPORT_S3_PREFIX") or ("daily-reports/roy-sk" if project == "roy" else f"daily-reports/{project}"))
          PY
              )"
            fi
          fi
          if [[ "${PROJECT}" == "roy" && -z "${REPORT_S3_BUCKET_VALUE}" ]]; then
            REPORT_S3_BUCKET_VALUE="biznisweb-reporting-artifacts-${ACCOUNT_ID}-${AWS_REGION}"
          fi
          REPORT_S3_PREFIX_VALUE="${REPORT_S3_PREFIX_VALUE:-daily-reports/${PROJECT}}"
          REPORT_S3_PREFIX_VALUE="${REPORT_S3_PREFIX_VALUE#/}"
          REPORT_S3_PREFIX_VALUE="${REPORT_S3_PREFIX_VALUE%/}"
          if [[ "${PROJECT}" == "roy" && -z "${REPORT_S3_BUCKET_VALUE}" ]]; then
            echo "ROY App Runner requires REPORT_S3_BUCKET or an input s3_bucket for latest KPI artifacts." >&2
            exit 1
          fi

          if [[ -n "${REPORT_S3_BUCKET_VALUE}" ]]; then
            if ! aws s3api head-bucket --bucket "${REPORT_S3_BUCKET_VALUE}" >/dev/null 2>&1; then
              if [[ "${AWS_REGION}" == "us-east-1" ]]; then
                aws s3api create-bucket --bucket "${REPORT_S3_BUCKET_VALUE}" >/dev/null
              else
                aws s3api create-bucket \
                  --bucket "${REPORT_S3_BUCKET_VALUE}" \
                  --create-bucket-configuration LocationConstraint="${AWS_REGION}" >/dev/null
              fi
            fi
            aws s3api put-public-access-block \
              --bucket "${REPORT_S3_BUCKET_VALUE}" \
              --public-access-block-configuration \
              BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
            aws s3api put-bucket-encryption \
              --bucket "${REPORT_S3_BUCKET_VALUE}" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          fi

          if [[ "${PROJECT}" == "roy" ]]; then
            TASK_ROLE_ARN="$(python - <<'PY'
          import json
          task_def = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          print(task_def.get("taskRoleArn") or "")
          PY
            )"
            if [[ -z "${TASK_ROLE_ARN}" ]]; then
              echo "ROY reporting task definition has no taskRoleArn; cannot grant S3 artifact upload access." >&2
              exit 1
            fi
            TASK_ROLE_NAME="$(python - "${TASK_ROLE_ARN}" <<'PY'
          import sys
          print(sys.argv[1].rsplit("/", 1)[-1])
          PY
            )"
            cat > reporting-artifacts-policy.json <<JSON
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Action": ["s3:ListBucket"],
                "Resource": "arn:aws:s3:::${REPORT_S3_BUCKET_VALUE}",
                "Condition": {
                  "StringLike": {
                    "s3:prefix": [
                      "${REPORT_S3_PREFIX_VALUE}/*",
                      "${REPORT_S3_PREFIX_VALUE}"
                    ]
                  }
                }
              },
              {
                "Effect": "Allow",
                "Action": ["s3:GetObject", "s3:PutObject"],
                "Resource": "arn:aws:s3:::${REPORT_S3_BUCKET_VALUE}/${REPORT_S3_PREFIX_VALUE}/*"
              }
            ]
          }
          JSON
            aws iam put-role-policy \
              --role-name "${TASK_ROLE_NAME}" \
              --policy-name ReportingLiveDashboardArtifacts \
              --policy-document file://reporting-artifacts-policy.json

            NEEDS_REPORT_TASK_UPDATE="$(python - "${REPORT_S3_BUCKET_VALUE}" "${REPORT_S3_PREFIX_VALUE}" "${IMAGE_IDENTIFIER}" <<'PY'
          import json
          import sys
          bucket, prefix, image_identifier = sys.argv[1], sys.argv[2], sys.argv[3]
          task_def = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          container = task_def["containerDefinitions"][0]
          env = {
              item.get("name"): item.get("value")
              for item in container.get("environment", [])
          }
          secret_names = {
              item.get("name")
              for item in container.get("secrets", [])
          }
          has_conflicting_secret = bool({"REPORT_S3_BUCKET", "REPORT_S3_PREFIX"} & secret_names)
          image_mismatch = container.get("image") != image_identifier
          needs_update = (
              has_conflicting_secret
              or env.get("REPORT_S3_BUCKET") != bucket
              or env.get("REPORT_S3_PREFIX") != prefix
              or image_mismatch
          )
          print("true" if needs_update else "false")
          PY
            )"
            if [[ "${NEEDS_REPORT_TASK_UPDATE}" == "true" ]]; then
              python - "${REPORT_S3_BUCKET_VALUE}" "${REPORT_S3_PREFIX_VALUE}" "${IMAGE_IDENTIFIER}" <<'PY' > task-definition-s3.json
          import copy
          import json
          import sys

          bucket, prefix, image_identifier = sys.argv[1], sys.argv[2], sys.argv[3]
          source = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          allowed = {
              "family",
              "taskRoleArn",
              "executionRoleArn",
              "networkMode",
              "containerDefinitions",
              "volumes",
              "placementConstraints",
              "requiresCompatibilities",
              "cpu",
              "memory",
              "ipcMode",
              "pidMode",
              "proxyConfiguration",
              "inferenceAccelerators",
              "ephemeralStorage",
              "runtimePlatform",
          }
          task = {key: copy.deepcopy(value) for key, value in source.items() if key in allowed and value not in (None, [], {})}
          container = task["containerDefinitions"][0]
          container["image"] = image_identifier
          env = [item for item in container.get("environment", []) if item.get("name") not in {"REPORT_S3_BUCKET", "REPORT_S3_PREFIX"}]
          env.extend([
              {"name": "REPORT_S3_BUCKET", "value": bucket},
              {"name": "REPORT_S3_PREFIX", "value": prefix},
          ])
          container["environment"] = env
          container["secrets"] = [
              item
              for item in container.get("secrets", [])
              if item.get("name") not in {"REPORT_S3_BUCKET", "REPORT_S3_PREFIX"}
          ]
          json.dump(task, sys.stdout)
          PY
              REGISTERED_TASK_DEFINITION_ARN="$(aws ecs register-task-definition \
                --cli-input-json file://task-definition-s3.json \
                --region "${AWS_REGION}" \
                --query 'taskDefinition.taskDefinitionArn' \
                --output text)"
              TASK_DEFINITION_ARN="${REGISTERED_TASK_DEFINITION_ARN}"
              aws ecs describe-task-definition \
                --task-definition "${TASK_DEFINITION_ARN}" \
                --region "${AWS_REGION}" > task-definition.json

              python - "${TASK_DEFINITION_ARN}" <<'PY'
          import json
          import sys

          task_definition_arn = sys.argv[1]
          schedule = json.load(open("schedule.json", encoding="utf-8"))

          def clean(value):
              if isinstance(value, dict):
                  cleaned = {}
                  for key, raw in value.items():
                      item = clean(raw)
                      if item in (None, "", [], {}):
                          continue
                      cleaned[key] = item
                  return cleaned
              if isinstance(value, list):
                  return [clean(item) for item in value if clean(item) not in (None, "", [], {})]
              return value

          target = clean(schedule["Target"])
          target["EcsParameters"]["TaskDefinitionArn"] = task_definition_arn
          json.dump(target, open("schedule-target.json", "w", encoding="utf-8"))
          json.dump(clean(schedule["FlexibleTimeWindow"]), open("schedule-flexible-time-window.json", "w", encoding="utf-8"))
          PY
              SCHEDULE_EXPRESSION="$(python - <<'PY'
          import json
          print(json.load(open("schedule.json", encoding="utf-8"))["ScheduleExpression"])
          PY
              )"
              SCHEDULE_STATE="$(python - <<'PY'
          import json
          print(json.load(open("schedule.json", encoding="utf-8")).get("State") or "ENABLED")
          PY
              )"
              SCHEDULE_TIMEZONE="$(python - <<'PY'
          import json
          print(json.load(open("schedule.json", encoding="utf-8")).get("ScheduleExpressionTimezone") or "")
          PY
              )"
              SCHEDULE_GROUP="$(python - <<'PY'
          import json
          print(json.load(open("schedule.json", encoding="utf-8")).get("GroupName") or "")
          PY
              )"
              UPDATE_SCHEDULE_ARGS=(
                --name "${REPORT_SCHEDULE_NAME}"
                --schedule-expression "${SCHEDULE_EXPRESSION}"
                --flexible-time-window file://schedule-flexible-time-window.json
                --target file://schedule-target.json
                --state "${SCHEDULE_STATE}"
                --region "${AWS_REGION}"
              )
              if [[ -n "${SCHEDULE_TIMEZONE}" ]]; then
                UPDATE_SCHEDULE_ARGS+=(--schedule-expression-timezone "${SCHEDULE_TIMEZONE}")
              fi
              if [[ -n "${SCHEDULE_GROUP}" ]]; then
                UPDATE_SCHEDULE_ARGS+=(--group-name "${SCHEDULE_GROUP}")
              fi
              aws scheduler update-schedule "${UPDATE_SCHEDULE_ARGS[@]}"
              aws scheduler get-schedule \
                --name "${REPORT_SCHEDULE_NAME}" \
                --region "${AWS_REGION}" > schedule.json
            fi

            CLUSTER_ARN="$(python - <<'PY'
          import json
          schedule = json.load(open("schedule.json", encoding="utf-8"))
          print(schedule["Target"]["Arn"])
          PY
            )"
            LAUNCH_TYPE="$(python - <<'PY'
          import json
          schedule = json.load(open("schedule.json", encoding="utf-8"))
          print(schedule["Target"]["EcsParameters"].get("LaunchType") or "FARGATE")
          PY
            )"
            PLATFORM_VERSION="$(python - <<'PY'
          import json
          schedule = json.load(open("schedule.json", encoding="utf-8"))
          print(schedule["Target"]["EcsParameters"].get("PlatformVersion") or "")
          PY
            )"
            python - <<'PY' > network.json
          import json
          schedule = json.load(open("schedule.json", encoding="utf-8"))
          raw = schedule["Target"]["EcsParameters"]["NetworkConfiguration"]["awsvpcConfiguration"]
          normalized = {
              "awsvpcConfiguration": {
                  "subnets": raw.get("Subnets") or raw.get("subnets") or [],
                  "securityGroups": raw.get("SecurityGroups") or raw.get("securityGroups") or [],
                  "assignPublicIp": raw.get("AssignPublicIp") or raw.get("assignPublicIp") or "DISABLED",
              }
          }
          print(json.dumps(normalized))
          PY
            CONTAINER_NAME="$(python - <<'PY'
          import json
          task_def = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          print(task_def["containerDefinitions"][0]["name"])
          PY
            )"
            LOG_GROUP="$(python - <<'PY'
          import json
          task_def = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          options = task_def["containerDefinitions"][0].get("logConfiguration", {}).get("options", {})
          print(options.get("awslogs-group", ""))
          PY
            )"
            LOG_PREFIX="$(python - <<'PY'
          import json
          task_def = json.load(open("task-definition.json", encoding="utf-8"))["taskDefinition"]
          options = task_def["containerDefinitions"][0].get("logConfiguration", {}).get("options", {})
          print(options.get("awslogs-stream-prefix", ""))
          PY
            )"
            if [[ -z "${LOG_GROUP}" || -z "${LOG_PREFIX}" ]]; then
              echo "ROY reporting task definition needs CloudWatch logs for localhost marker verification." >&2
              exit 1
            fi
          REFRESH_SCRIPT="$(cat <<'SH'
          set -euo pipefail
          PROJECT="${REPORT_PROJECT:?REPORT_PROJECT missing}"
          if [[ "${SKIP_ARTIFACT_REFRESH:-false}" == "true" ]]; then
            echo "LIVE_ARTIFACT_REFRESH_SKIPPED project=${PROJECT}"
            python - <<'PY'
          import json
          import os
          from pathlib import Path

          project = os.environ["REPORT_PROJECT"]
          marker_dir = Path("/tmp/live-dashboard-marker")
          marker_dir.mkdir(parents=True, exist_ok=True)
          marker = {
              "marker": "LIVE_ARTIFACT_MARKER_OK",
              "project": project,
              "mode": "skip_artifact_refresh",
          }
          (marker_dir / "marker.json").write_text(json.dumps(marker, ensure_ascii=False), encoding="utf-8")
          PY
            python -m http.server 8000 --bind 127.0.0.1 --directory /tmp/live-dashboard-marker >/tmp/live-dashboard-marker/http.log 2>&1 &
            MARKER_PID="$!"
            trap 'kill "${MARKER_PID}" >/dev/null 2>&1 || true' EXIT
            echo "LIVE_ARTIFACT_MARKER_BEGIN"
            for marker_attempt in $(seq 1 10); do
              if curl -fsS http://127.0.0.1:8000/marker.json; then
                break
              fi
              if [[ "${marker_attempt}" == "10" ]]; then
                exit 1
              fi
              sleep 1
            done
            echo
            echo "LIVE_ARTIFACT_MARKER_END"
            exit 0
          fi
          echo "LIVE_ARTIFACT_REFRESH_START project=${PROJECT}"
          python daily_report_runner.py --project "${PROJECT}" --skip-email --skip-invoices --creditnote-storno-dry-run
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          project = os.environ["REPORT_PROJECT"]
          data_dir = Path("data") / project
          payload_path = data_dir / "dashboard_payload_latest.json"
          payload = json.loads(payload_path.read_text(encoding="utf-8"))
          dashboard = payload.get("dashboard") or {}
          kpis = dashboard.get("kpis") or {}
          series = dashboard.get("series") or {}
          commercial = dashboard.get("roy_product_demand") or {}
          inventory = dashboard.get("roy_operations_inventory") or commercial
          assert kpis.get("windows"), "KPI windows missing in generated payload"
          assert series.get("dates"), "KPI source series dates missing in generated payload"
          if project == "roy":
              assert inventory.get("summary"), "Operations inventory summary missing in generated payload"
              assert inventory.get("inventory_rows"), "Operations inventory rows missing in generated payload"
          invalid_loss_rows = []
          for row in commercial.get("loss_product_rows") or []:
              if not isinstance(row, dict):
                  invalid_loss_rows.append(row)
                  continue
              raw_gross = row.get("gross_profit")
              if raw_gross is None:
                  raw_gross = row.get("cm1_profit")
              try:
                  gross_profit = float(raw_gross)
              except (TypeError, ValueError):
                  invalid_loss_rows.append(row)
                  continue
              if gross_profit >= 0:
                  invalid_loss_rows.append(row)
          assert not invalid_loss_rows, "Loss products must be based on negative gross profit only"
          marker_dir = Path("/tmp/live-dashboard-marker")
          marker_dir.mkdir(parents=True, exist_ok=True)
          marker = {
              "marker": "LIVE_ARTIFACT_MARKER_OK",
              "project": project,
              "payload_path": str(payload_path),
              "kpi_series_days": len(series.get("dates") or []),
              "inventory_alerts": (inventory.get("summary") or {}).get("alert_delivery_count"),
              "inventory_rows": len(inventory.get("inventory_rows") or []),
          }
          (marker_dir / "marker.json").write_text(json.dumps(marker, ensure_ascii=False), encoding="utf-8")
          PY
          python -m http.server 8000 --bind 127.0.0.1 --directory /tmp/live-dashboard-marker >/tmp/live-dashboard-marker/http.log 2>&1 &
          MARKER_PID="$!"
          trap 'kill "${MARKER_PID}" >/dev/null 2>&1 || true' EXIT
          echo "LIVE_ARTIFACT_MARKER_BEGIN"
          for marker_attempt in $(seq 1 10); do
            if curl -fsS http://127.0.0.1:8000/marker.json; then
              break
            fi
            if [[ "${marker_attempt}" == "10" ]]; then
              exit 1
            fi
            sleep 1
          done
          echo
          echo "LIVE_ARTIFACT_MARKER_END"
          SH
            )"
            export CONTAINER_NAME PROJECT REPORT_S3_BUCKET_VALUE REPORT_S3_PREFIX_VALUE REFRESH_SCRIPT
            python - <<'PY' > refresh-overrides.json
          import json
          import os
          print(json.dumps({
              "containerOverrides": [
                  {
                      "name": os.environ["CONTAINER_NAME"],
                      "command": ["/bin/bash", "-lc", os.environ["REFRESH_SCRIPT"]],
                      "environment": [
                          {"name": "REPORT_PROJECT", "value": os.environ["PROJECT"]},
                          {"name": "REPORT_S3_BUCKET", "value": os.environ["REPORT_S3_BUCKET_VALUE"]},
                          {"name": "REPORT_S3_PREFIX", "value": os.environ["REPORT_S3_PREFIX_VALUE"]},
                          {"name": "REPORT_SKIP_INVOICES", "value": "true"},
                          {"name": "SKIP_ARTIFACT_REFRESH", "value": os.environ.get("SKIP_ARTIFACT_REFRESH", "false")},
                      ],
                  }
              ]
          }))
          PY
            RUN_ARGS=(
              --cluster "${CLUSTER_ARN}"
              --task-definition "${TASK_DEFINITION_ARN}"
              --launch-type "${LAUNCH_TYPE}"
              --network-configuration file://network.json
              --overrides file://refresh-overrides.json
              --started-by "codex-roy-live-dashboard-refresh"
              --region "${AWS_REGION}"
            )
            if [[ -n "${PLATFORM_VERSION}" ]]; then
              RUN_ARGS+=(--platform-version "${PLATFORM_VERSION}")
            fi
            aws ecs run-task "${RUN_ARGS[@]}" > refresh-run-task.json
            REFRESH_TASK_ARN="$(python - <<'PY'
          import json
          run = json.load(open("refresh-run-task.json", encoding="utf-8"))
          failures = run.get("failures") or []
          if failures:
              raise SystemExit(f"run-task failures: {failures}")
          print(run["tasks"][0]["taskArn"])
          PY
            )"
            REFRESH_TASK_ID="${REFRESH_TASK_ARN##*/}"
            PRIVATE_IP=""
